stages:
  - build
  - deploy

variables:
  BACKEND_IMAGE: kanchana20/itemsapi-backend
  FRONTEND_IMAGE: kanchana20/itemsapi-frontend

# ====================================
# BUILD BACKEND
# ====================================

build_backend:
  stage: build

  image: docker:latest

  services:
    - docker:dind

  before_script:
    - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD

  script:
    - docker build -t $BACKEND_IMAGE:$CI_PIPELINE_ID ./apps/backend
    - docker push $BACKEND_IMAGE:$CI_PIPELINE_ID

  only:
    - main

# ====================================
# BUILD FRONTEND
# ====================================

build_frontend:
  stage: build

  image: docker:latest

  services:
    - docker:dind

  before_script:
    - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD

  script:
    - docker build -t $FRONTEND_IMAGE:$CI_PIPELINE_ID ./apps/frontend
    - docker push $FRONTEND_IMAGE:$CI_PIPELINE_ID

  only:
    - main

# ====================================
# DEPLOY TO MINIKUBE
# ====================================

deploy:
  stage: deploy
  tags:
    - minikube
  script:
    - helm upgrade --install itemsapi ./helm --namespace itemsapi-v2 --create-namespace --set backend.tag="$env:CI_PIPELINE_ID" --set frontend.tag="$env:CI_PIPELINE_ID"
  only:
    - main
  needs:
    - build_backend
    - build_frontend