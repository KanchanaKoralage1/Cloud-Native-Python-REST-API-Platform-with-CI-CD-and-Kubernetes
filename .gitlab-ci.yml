stages:
  - build

variables:
  BACKEND_IMAGE: kanchana20/itemsapi-backend
  FRONTEND_IMAGE: kanchana20/itemsapi-frontend


# BACKEND IMAGE BUILD

build_backend:
  stage: build

  image: docker:latest

  services:
    - docker:dind

  before_script:
    - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD

  script:
    - docker build -t $BACKEND_IMAGE:$CI_PIPELINE_ID ./apps/backend
    - docker push $BACKEND_IMAGE:$CI_PIPELINE_ID

  only:
    - development


# FRONTEND IMAGE BUILD

build_frontend:
  stage: build

  image: docker:latest

  services:
    - docker:dind

  before_script:
    - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD

  script:
    - docker build -t $FRONTEND_IMAGE:$CI_PIPELINE_ID ./apps/frontend
    - docker push $FRONTEND_IMAGE:$CI_PIPELINE_ID

  only:
    - development