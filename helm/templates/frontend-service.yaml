apiVersion: v1
kind: Service
metadata:
  name: itemsapi-frontend-service
  namespace: {{.Values.namespace}}
spec:
  selector:
    app: itemsapi-frontend
  type: NodePort
  ports:
    - protocol: TCP
      port: {{.Values.frontend.servicePort}}
      targetPort: 80
      nodePort: {{.Values.frontend.nodePort}}
      